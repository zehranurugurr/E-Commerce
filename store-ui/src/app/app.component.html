<input id="sidebar-toggle" class="sidebar-toggle" type="checkbox" />
<label class="sidebar-overlay" for="sidebar-toggle" aria-hidden="true"></label>

<div class="page-wrapper app-shell">
  <aside class="menu-sidebar sidebar">
    <div class="logo brand">
      <div class="brand-panel">
        <a routerLink="/home" class="brand-link">
          <span class="brand-mark">E</span>
          <span class="brand-copy">
            <span class="brand-eyebrow">Echo Market</span>
            <span class="brand-tagline">Modern alisveris deneyimi</span>
          </span>
        </a>
        <div class="brand-pulse" aria-hidden="true"></div>
      </div>
      <label class="sidebar-close" for="sidebar-toggle" aria-label="Menuyu Kapat">x</label>
    </div>

    <div class="sidebar-heading">
      <div class="sidebar-heading-copy">
        <span>Kategoriler</span>
        <small>Trend teknoloji seckisi</small>
      </div>
      <span class="sidebar-pill">Kesfet</span>
    </div>

    <app-product-category-menu></app-product-category-menu>
  </aside>

  <div class="page-container app-main">
    <header class="header-desktop header-modern">
      <div class="section-content section-content-p30">
        <div class="container-fluid">
          <div class="header-wrap header-stack">
            <div class="header-left">
              <label class="burger" for="sidebar-toggle" aria-label="Menuyu Ac/Kapat">
                <span></span>
                <span></span>
              </label>
              <div class="header-title">
                <h2>Echo Market</h2>
              </div>
            </div>

            <div class="header-search">
              <app-search></app-search>
            </div>

            <div class="header-actions">
              <a routerLink="/home" class="btn btn-outline-primary nav-home">Ana Sayfa</a>
              <app-cart-status></app-cart-status>

              <ng-container *ngIf="!authService.isLoggedIn(); else loggedInMenu">
                <div class="auth-actions">
                  <a routerLink="/login" class="btn btn-outline-primary auth-btn">Giris Yap</a>
                  <a routerLink="/register" class="btn btn-primary auth-btn primary">Uye Ol</a>
                </div>
              </ng-container>

              <ng-template #loggedInMenu>
                <div
                  class="profile-menu"
                  [class.open]="profileOpen"
                  (keydown.escape)="closeProfile()"
                >
                  <button
                    class="profile-btn"
                    type="button"
                    (click)="toggleProfile()"
                    [attr.aria-expanded]="profileOpen"
                    aria-haspopup="true"
                    aria-controls="profile-menu"
                  >
                    <span class="avatar">{{ avatarInitials }}</span>
                    <span class="profile-text">
                      <span class="profile-name">{{ displayName }}</span>
                      <span class="profile-role" *ngIf="roleLabel">{{ roleLabel }}</span>
                    </span>
                    <span class="chev" aria-hidden="true">v</span>
                  </button>

                  <div class="profile-dropdown" id="profile-menu" role="menu">
                    <div class="profile-section">
                      <span class="section-label">Hesap</span>
                      <a routerLink="/account" role="menuitem" (click)="closeProfile()">Hesabim</a>
                      <a routerLink="/cart-details" role="menuitem" (click)="closeProfile()">Sepetim</a>
                      <a routerLink="/checkout" role="menuitem" (click)="closeProfile()">Odeme</a>
                    </div>

                    <div class="profile-section" *ngIf="isAdmin">
                      <span class="section-label">Yonetim</span>
                      <a routerLink="/admin/products" role="menuitem" (click)="closeProfile()">Urun Yonetimi</a>
                    </div>

                    <button class="logout-btn" type="button" (click)="logout(); closeProfile()">
                      Cikis Yap
                    </button>
                  </div>
                </div>
              </ng-template>
            </div>
          </div>
        </div>
      </div>
    </header>

    <router-outlet></router-outlet>
  </div>
</div>

<footer></footer>
